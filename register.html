<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Đăng ký tài khoản Quiz Lab">
    <meta name="theme-color" content="#0a0e27">
    <link rel="icon" type="image/x-icon" href="icon.ico">
    <title>Đăng Ký - Quiz Lab</title>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body class="has-topbar">
    <header class="site-topbar">
        <div class="site-topbar-inner">
            <a href="index.html" class="site-brand"><span>Quiz Lab</span></a>
            <nav class="site-nav">
                <a href="index.html">Trang chủ</a>
                <a href="login.html">Đăng nhập</a>
                <a href="register.html">Đăng ký</a>
            </nav>
            <button type="button" class="theme-toggle" data-theme-toggle>🌙</button>
        </div>
    </header>

    <div class="container">
        <div class="login-page">
            <div class="login-card glassmorphism">
                <div class="login-header">
                    <h1>Tạo Tài Khoản</h1>
                    <p>Hệ thống chỉ cho phép đăng ký bằng mã giới thiệu hợp lệ.</p>
                </div>

                <form id="registerForm" class="login-form">
                    <div class="form-group">
                        <label for="fullName">Họ và tên</label>
                        <input type="text" id="fullName" name="fullName" placeholder="Nhập họ và tên" required>
                    </div>

                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" placeholder="Tối thiểu 4 ký tự" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Mật khẩu</label>
                        <div class="password-field-wrap">
                            <input type="password" id="password" name="password" placeholder="Tối thiểu 6 ký tự" required>
                            <button type="button" class="password-peek" aria-label="Hiện/ẩn mật khẩu">Hiện</button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">Nhập lại mật khẩu</label>
                        <div class="password-field-wrap">
                            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Nhập lại mật khẩu" required>
                            <button type="button" class="password-peek" aria-label="Hiện/ẩn mật khẩu">Hiện</button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="referralCode">Mã giới thiệu</label>
                        <input type="text" id="referralCode" name="referralCode" placeholder="Ví dụ: REF-XXXXXXXX" required>
                    </div>

                    <button type="submit" class="btn-login">Đăng Ký</button>
                </form>

                <div id="errorMessage" class="error-message"></div>
                <p id="successMessage" class="help-text" style="display:none;color:#22d3ee;margin-top:0.7rem;"></p>

                <p class="back-link">
                    Đã có tài khoản? <a href="login.html">Đăng nhập</a>
                </p>
            </div>
        </div>
    </div>

    <div id="loadingOverlay" class="loading-overlay" aria-hidden="true">
        <div class="loading-modal" role="status" aria-live="polite">
            <div class="spinner" aria-hidden="true"></div>
            <p>Đang xác thực mã giới thiệu...</p>
        </div>
    </div>

    <footer class="site-footer">
        <div class="site-footer-inner">
            <p>© 2026 <a href="https://tsbyin.dev" target="_blank" rel="noopener noreferrer" style="font-weight:700;color:var(--cyan);text-shadow:0 0 8px var(--cyan);">tsbyin.dev</a> · <span data-vi>Thiết kế &amp; phát triển bởi</span><span data-en>Designed &amp; built by</span> <a href="https://tsbyin.dev" target="_blank" rel="noopener noreferrer" style="font-weight:700;color:var(--cyan);text-shadow:0 0 8px var(--cyan);">Tuấn Sỹ</a></p>
            <nav class="footer-nav" aria-label="Footer navigation">
                <a href="index.html">Trang chủ</a>
                <a href="https://tsbyin.dev/privacy.html">Privacy Policy</a>
                <a href="https://tsbyin.dev">tsbyin.dev</a>
            </nav>
        </div>
    </footer>


    <script src="assets/script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (window.antiCheat && typeof window.antiCheat.enable === 'function') {
                window.antiCheat.enable(false);
            }
        });

        const clipboardAllowedFieldIds = ['fullName', 'username', 'referralCode'];
        clipboardAllowedFieldIds.forEach((id) => {
            const input = document.getElementById(id);
            if (!input) {
                return;
            }

            input.addEventListener('keydown', (event) => {
                const key = String(event.key || '').toLowerCase();
                const isCmdOrCtrl = event.ctrlKey || event.metaKey;
                if (isCmdOrCtrl && (key === 'c' || key === 'v' || key === 'x')) {
                    event.stopPropagation();
                }
            }, true);

            ['copy', 'cut', 'paste'].forEach((eventName) => {
                input.addEventListener(eventName, (event) => {
                    event.stopPropagation();
                }, true);
            });

            input.addEventListener('mousedown', (event) => {
                if (event.detail > 1) {
                    event.stopPropagation();
                }
            }, true);
        });

        const referralCodeInput = document.getElementById('referralCode');
        if (referralCodeInput) {
            referralCodeInput.addEventListener('dblclick', () => {
                referralCodeInput.select();
            });
        }

        ['password', 'confirmPassword'].forEach((id) => {
            const input = document.getElementById(id);
            if (!input) {
                return;
            }

            ['copy', 'cut', 'paste'].forEach((eventName) => {
                input.addEventListener(eventName, (event) => {
                    event.preventDefault();
                });
            });

            const wrap = input.closest('.password-field-wrap');
            if (wrap) {
                const peekBtn = wrap.querySelector('.password-peek');
                if (peekBtn) {
                    let isVisible = false;
                    peekBtn.addEventListener('click', (event) => {
                        event.preventDefault();
                        isVisible = !isVisible;
                        if (isVisible) {
                            input.type = 'text';
                            peekBtn.classList.add('is-active');
                            peekBtn.textContent = 'Ẩn';
                        } else {
                            input.type = 'password';
                            peekBtn.classList.remove('is-active');
                            peekBtn.textContent = 'Hiện';
                        }
                    });
                }
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async function (event) {
            event.preventDefault();

            const fullName = document.getElementById('fullName').value.trim();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const referralCode = document.getElementById('referralCode').value.trim();
            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');
            const loadingOverlay = document.getElementById('loadingOverlay');

            errorDiv.textContent = '';
            successDiv.style.display = 'none';
            successDiv.textContent = '';

            if (!fullName || !username || !password || !confirmPassword || !referralCode) {
                errorDiv.textContent = 'Vui lòng nhập đầy đủ thông tin.';
                return;
            }

            if (username.length < 4) {
                errorDiv.textContent = 'Tên đăng nhập phải có ít nhất 4 ký tự.';
                return;
            }

            if (password.length < 6) {
                errorDiv.textContent = 'Mật khẩu phải có ít nhất 6 ký tự.';
                return;
            }

            if (password !== confirmPassword) {
                errorDiv.textContent = 'Mật khẩu nhập lại không khớp.';
                return;
            }

            if (loadingOverlay) {
                loadingOverlay.classList.add('is-visible');
                loadingOverlay.setAttribute('aria-hidden', 'false');
            }

            try {
                const passwordHash = typeof hashPasswordWithSalt === 'function'
                    ? await hashPasswordWithSalt(password)
                    : await sha256(`${password}TsByinChei`);
                const result = await APIClient.registerUser({
                    fullName,
                    username,
                    passwordHash,
                    referralCode
                });

                if (!result || !result.success) {
                    errorDiv.textContent = (result && result.message) || 'Không thể đăng ký tài khoản.';
                    return;
                }

                successDiv.textContent = 'Đăng ký thành công. Hệ thống sẽ chuyển sang trang đăng nhập...';
                successDiv.style.display = 'block';

                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1200);
            } catch (error) {
                console.error('Register error:', error);
                errorDiv.textContent = 'Lỗi kết nối. Vui lòng thử lại.';
            } finally {
                if (loadingOverlay) {
                    loadingOverlay.classList.remove('is-visible');
                    loadingOverlay.setAttribute('aria-hidden', 'true');
                }
            }
        });
    </script>
</body>
</html>
