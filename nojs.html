<!doctype html>
<html lang="vi" class="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Yêu Cầu Bật JavaScript — Quiz Lab</title>
  <link rel="icon" type="image/x-icon" href="icon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700;900&display=swap" rel="stylesheet">
  <style>
      :root {
          --glow-color: #f43f5e; /* Rose color for warning */
      }
      * {
          box-sizing: border-box;
          margin: 0;
          padding: 0;
      }
      body {
          margin: 0;
          min-height: 100vh;
          font-family: 'Plus Jakarta Sans', sans-serif;
          background-color: #030712;
          color: #f8fafc;
          background-image: 
              linear-gradient(to right, rgba(255,255,255,0.02) 1px, transparent 1px),
              linear-gradient(to bottom, rgba(255,255,255,0.02) 1px, transparent 1px);
          background-size: 40px 40px;
          background-attachment: fixed;
          overflow: hidden;
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 1rem;
      }
      /* Animated background blob */
      .bg-blob {
          position: absolute;
          width: 600px;
          height: 600px;
          background: rgba(244, 63, 94, 0.15); /* rose-500 with opacity */
          border-radius: 50%;
          filter: blur(100px);
          z-index: -1;
          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%);
          animation: pulseGlow 4s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }

      @keyframes pulseGlow {
          0%, 100% { opacity: 0.4; transform: translate(-50%, -50%) scale(1); }
          50% { opacity: 0.7; transform: translate(-50%, -50%) scale(1.1); }
      }

      .container {
          width: 100%;
          max-width: 48rem; /* 768px */
          position: relative;
          z-index: 10;
      }

      .glass-panel {
          background: rgba(15, 23, 42, 0.6);
          backdrop-filter: blur(16px);
          -webkit-backdrop-filter: blur(16px);
          border: 1px solid rgba(255, 255, 255, 0.08);
          box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
          border-radius: 1.5rem;
          padding: 3rem 4rem;
          display: flex;
          flex-direction: row;
          align-items: center;
          gap: 3.5rem;
          animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      @keyframes fadeIn {
          0% { opacity: 0; transform: translateY(20px) scale(0.95); }
          100% { opacity: 1; transform: translateY(0) scale(1); }
      }

      /* Left side: Icon */
      .icon-container {
          flex-shrink: 0;
          animation: float 6s ease-in-out infinite;
          position: relative;
      }

      @keyframes float {
          0%, 100% { transform: translateY(0); }
          50% { transform: translateY(-10px); }
      }

      .icon-glow {
          position: absolute;
          inset: 0;
          background: var(--glow-color);
          filter: blur(30px);
          opacity: 0.4;
          mix-blend-mode: screen;
      }

      .icon-text {
          font-family: 'Space Grotesk', monospace;
          font-size: 7rem;
          font-weight: 900;
          color: var(--glow-color);
          text-shadow: 0 10px 30px rgba(244, 63, 94, 0.4);
          position: relative;
          z-index: 10;
          line-height: 1;
      }

      /* Right side: Content */
      .content {
          flex: 1;
      }

      .badge {
          display: inline-flex;
          align-items: center;
          gap: 0.5rem;
          padding: 0.375rem 0.75rem;
          border-radius: 9999px;
          background: rgba(255, 255, 255, 0.05);
          border: 1px solid rgba(255, 255, 255, 0.1);
          font-size: 0.75rem;
          font-weight: 700;
          text-transform: uppercase;
          letter-spacing: 0.05em;
          margin-bottom: 1rem;
      }

      .badge-dot {
          width: 0.5rem;
          height: 0.5rem;
          border-radius: 50%;
          background: var(--glow-color);
          animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }

      @keyframes pulse {
          0%, 100% { opacity: 1; }
          50% { opacity: .5; }
      }

      h1 {
          font-size: 2.25rem;
          font-weight: 800;
          color: #fff;
          margin-bottom: 0.75rem;
          line-height: 1.2;
      }

      p.desc {
          color: #94a3b8;
          font-size: 1rem;
          line-height: 1.6;
          margin-bottom: 1.5rem;
      }

      .steps {
          font-family: 'Space Grotesk', monospace;
          font-size: 0.875rem;
          color: #64748b;
          background: rgba(0, 0, 0, 0.3);
          padding: 1rem 1.25rem;
          border-radius: 0.75rem;
          border: 1px solid rgba(255, 255, 255, 0.05);
          margin-bottom: 2rem;
          line-height: 1.6;
      }

      .steps strong {
          color: #cbd5e1;
      }

      .actions {
          display: flex;
          flex-wrap: wrap;
          align-items: center;
          gap: 1rem;
      }

      .btn-primary {
          position: relative;
          display: inline-flex;
          align-items: center;
          gap: 0.5rem;
          padding: 0.75rem 1.5rem;
          font-weight: 700;
          color: #0f172a;
          background: #fff;
          border-radius: 0.75rem;
          text-decoration: none;
          transition: all 0.3s ease;
          overflow: hidden;
      }

      .btn-primary:hover {
          transform: scale(1.05);
          box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
      }

      .btn-primary svg {
          width: 1.25rem;
          height: 1.25rem;
          transition: transform 0.3s;
      }

      .btn-primary:hover svg {
          transform: translateX(-4px);
      }

      .btn-secondary {
          display: inline-flex;
          align-items: center;
          gap: 0.5rem;
          padding: 0.75rem 1.5rem;
          font-weight: 700;
          color: #fff;
          background: rgba(255, 255, 255, 0.05);
          border: 1px solid rgba(255, 255, 255, 0.1);
          border-radius: 0.75rem;
          text-decoration: none;
          transition: all 0.3s ease;
      }

      .btn-secondary:hover {
          background: rgba(255, 255, 255, 0.1);
          transform: scale(1.05);
      }

      /* Responsive */
      @media (max-width: 768px) {
          .glass-panel {
              flex-direction: column;
              text-align: center;
              padding: 2rem;
              gap: 1.5rem;
          }
          .actions {
              justify-content: center;
          }
          .icon-text {
              font-size: 5rem;
          }
      }
  </style>

  <!-- Script redirect if JS is enabled -->
  <script>
      // Automatically return to index if JS is enabled
      window.location.replace('index.html');
  </script>
</head>
<body>
    
  <div class="bg-blob"></div>

  <div class="container">
      <div class="glass-panel">
          
          <!-- Icon Side -->
          <div class="icon-container">
              <div class="icon-glow"></div>
              <div class="icon-text">&lt;/&gt;</div>
          </div>

          <!-- Content Side -->
          <div class="content">
              <div class="badge">
                  <span class="badge-dot"></span>
                  <span>Cảnh Báo Hệ Thống</span>
              </div>
              
              <h1>JavaScript Đang Bị Tắt</h1>
              <p class="desc">Trình duyệt của bạn đang vô hiệu hóa JavaScript. Hệ thống Quiz Lab yêu cầu JavaScript để tải dữ liệu, chấm điểm và kích hoạt Anti-Cheat.</p>
              
              <div class="steps">
                  Vào <strong>Cài đặt</strong> &gt; <strong>Quyền riêng tư</strong> &gt; <strong>Cài đặt trang web</strong> &gt; Tìm <strong>JavaScript</strong> và chọn <strong>Cho phép</strong>.
              </div>
              
              <div class="actions">
                  <a href="index.html" class="btn-primary">
                      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                      Đã Bật? Quay Lại
                  </a>
                  
                  <a href="" class="btn-secondary">
                      <svg style="width:1.25rem;height:1.25rem;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                      Tải Lại Trang
                  </a>
              </div>
          </div>
          
      </div>
  </div>

</body>
</html>
