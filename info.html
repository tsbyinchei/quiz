<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Thông tin tài khoản Quiz Lab">
    <meta name="theme-color" content="#0a0e27">
    <link rel="icon" type="image/x-icon" href="icon.ico">
    <title>Hồ Sơ - Quiz Lab</title>
    <link rel="stylesheet" href="assets/style.css">
    <link rel="stylesheet" href="assets/pages/info.css">
</head>
<body class="has-topbar">
    <header class="site-topbar">
        <div class="site-topbar-inner">
            <a href="index.html" class="site-brand"><span>Quiz Lab</span></a>
            <nav class="site-nav">
                <a href="dashboard.html">Dashboard</a>
                <a href="password.html">Đổi mật khẩu</a>
            </nav>
            <button type="button" class="theme-toggle" data-theme-toggle>🌙</button>
        </div>
    </header>

    <div class="container">
        <main class="info-page">

            <!-- User identity section -->
            <section class="info-identity">
                <div class="info-avatar" id="infoAvatarInitials">?</div>
                <div class="info-identity-text">
                    <h1 id="infoFullName" class="info-name">—</h1>
                    <span class="info-role" id="infoUsername">—</span>
                </div>
            </section>

            <!-- Divider -->
            <hr class="info-divider">

            <!-- Stats row -->
            <section class="info-stats-row">
                <div class="info-stat">
                    <span class="info-stat-number" id="infoTotalAttempts">0</span>
                    <span class="info-stat-label">Bài đã tham gia</span>
                </div>
            </section>

            <!-- Divider -->
            <hr class="info-divider">

            <!-- Quick actions -->
            <section class="info-quick-actions">
                <button type="button" class="info-action-btn" id="btnBack">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                    <div class="action-text">
                        <span class="action-title">Quay lại</span>
                        <span class="action-desc">Về trang chính</span>
                    </div>
                    <svg class="action-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                </button>
                <button type="button" class="info-action-btn" id="btnPassword">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    <div class="action-text">
                        <span class="action-title">Đổi mật khẩu</span>
                        <span class="action-desc">Cập nhật bảo mật tài khoản</span>
                    </div>
                    <svg class="action-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                </button>
                <button type="button" class="info-action-btn info-action-danger" id="btnLogout">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    <div class="action-text">
                        <span class="action-title">Đăng xuất</span>
                        <span class="action-desc">Thoát phiên đăng nhập hiện tại</span>
                    </div>
                    <svg class="action-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                </button>
            </section>

            <div id="infoFeedback" class="feedback"></div>
        </main>
    </div>

    <footer class="site-footer">
        <div class="site-footer-inner">
            <p>© 2026 <a href="https://tsbyin.dev" target="_blank" rel="noopener noreferrer" style="font-weight:700;color:var(--cyan);text-shadow:0 0 8px var(--cyan);">tsbyin.dev</a> · <span data-vi>Thiết kế &amp; phát triển bởi</span><span data-en>Designed &amp; built by</span> <a href="https://tsbyin.dev" target="_blank" rel="noopener noreferrer" style="font-weight:700;color:var(--cyan);text-shadow:0 0 8px var(--cyan);">Tuấn Sỹ</a></p>
            <nav class="footer-nav" aria-label="Footer navigation">
                <a href="index.html">Trang chủ</a>
                <a href="https://tsbyin.dev/privacy.html">Privacy Policy</a>
                <a href="https://tsbyin.dev">tsbyin.dev</a>
            </nav>
        </div>
    </footer>

    <script src="assets/script.js?v=20"></script>
    <script src="assets/pages/info.js"></script>
</body>
</html>
