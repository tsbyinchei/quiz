<!DOCTYPE html>
<html lang="vi">
<head>
    <noscript><meta http-equiv="refresh" content="0; url=nojs"></noscript>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Đổi mật khẩu TsByin Exam">
    <meta name="theme-color" content="#0a0e27">
    <link rel="icon" type="image/x-icon" href="icon.ico">
    <title>Đổi Mật Khẩu - TsByin Exam</title>
    <link rel="stylesheet" href="assets/style.css">
    <link rel="stylesheet" href="assets/pages/password.css">
    <script src="assets/maintenance.js?v=3"></script>
</head>
<body class="has-topbar">
    <header class="site-topbar">
        <div class="site-topbar-inner">
            <a href="index" class="site-brand"><span>TsByin Exam</span></a>
            <nav class="site-nav">
                <a href="dashboard">Dashboard</a>
                <a href="info">Thông tin</a>
            </nav>

        </div>
    </header>

    <div class="container">
        <main class="pw-page">

            <!-- Page header -->
            <section class="pw-header">
                <div class="pw-icon">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                </div>
                <div class="pw-header-text">
                    <h1>Đổi Mật Khẩu</h1>
                    <p>Cập nhật mật khẩu để bảo vệ tài khoản của bạn.</p>
                </div>
            </section>

            <hr class="pw-divider">

            <!-- Form -->
            <form id="passwordForm" class="pw-form" autocomplete="off">
                <div class="pw-field">
                    <label for="currentPassword">Mật khẩu hiện tại</label>
                    <div class="password-field-wrap">
                        <input type="password" id="currentPassword" required placeholder="Nhập mật khẩu hiện tại">
                        <button type="button" class="password-peek" aria-label="Hiện/ẩn mật khẩu">Hiện</button>
                    </div>
                </div>

                <div class="pw-field">
                    <label for="newPassword">Mật khẩu mới</label>
                    <div class="password-field-wrap">
                        <input type="password" id="newPassword" minlength="6" required placeholder="Tối thiểu 6 ký tự">
                        <button type="button" class="password-peek" aria-label="Hiện/ẩn mật khẩu">Hiện</button>
                    </div>
                </div>

                <div class="pw-field">
                    <label for="confirmPassword">Nhập lại mật khẩu mới</label>
                    <div class="password-field-wrap">
                        <input type="password" id="confirmPassword" minlength="6" required placeholder="Xác nhận mật khẩu mới">
                        <button type="button" class="password-peek" aria-label="Hiện/ẩn mật khẩu">Hiện</button>
                    </div>
                </div>

                <hr class="pw-divider">

                <div class="pw-actions">
                    <button type="submit" class="pw-btn pw-btn-primary" id="btnSubmit">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                        Cập nhật mật khẩu
                    </button>
                    <button type="button" class="pw-btn pw-btn-ghost" id="btnBack">
                        ← Quay lại
                    </button>
                </div>
            </form>

            <div id="passwordFeedback" class="feedback"></div>
        </main>
    </div>

    <script src="assets/script.js?v=20"></script>
    <script src="assets/pages/password.js"></script>
</body>
</html>
