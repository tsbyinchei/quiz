<!DOCTYPE html>
<html lang="vi">
<head>
    <noscript><meta http-equiv="refresh" content="0; url=nojs"></noscript>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Đăng nhập TsByin Exam">
    <meta name="theme-color" content="#0a0e27">
    <link rel="icon" type="image/x-icon" href="icon.ico">
    <title>Đăng Nhập - TsByin Exam</title>
    <link rel="stylesheet" href="assets/style.css">
    <script src="assets/maintenance.js?v=3"></script>
</head>
<body class="has-topbar">
    <header class="site-topbar">
        <div class="site-topbar-inner">
            <a href="index" class="site-brand"><span>TsByin Exam</span></a>
            <nav class="site-nav">
                <a href="index">Trang chủ</a>
                <a href="login">Đăng nhập</a>
                <a href="register">Đăng ký</a>
            </nav>

        </div>
    </header>

    <div class="container">
        <div class="login-page">
            <div class="login-card glassmorphism">
                <div class="login-header">
                    <h1>TsByin Exam</h1>
                    <p>Hệ thống Kiểm tra Trực tuyến</p>
                </div>

                <form id="loginForm" class="login-form">
                    <div class="form-group">
                        <label for="username">Tên Đăng Nhập / Email</label>
                        <input 
                            type="text" 
                            id="username" 
                            name="username" 
                            placeholder="Nhập tên đăng nhập hoặc email"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.4rem;">
                            <label for="password" style="margin-bottom: 0;">Mật Khẩu</label>
                            <a href="forgot" class="forgot-link" style="font-size: 0.85rem; color: var(--text-light); transition: color var(--transition);">Quên mật khẩu?</a>
                        </div>
                        <div class="password-field-wrap">
                            <input 
                                type="password" 
                                id="password" 
                                name="password" 
                                placeholder="Nhập mật khẩu"
                                required
                            >
                            <button type="button" id="peekPasswordBtn" class="password-peek" aria-label="Hiện/ẩn mật khẩu">Hiện</button>
                        </div>
                    </div>

                    <button type="submit" class="btn-login">Đăng Nhập</button>
                </form>

                <div id="errorMessage" class="error-message"></div>
                <button type="button" id="unlockLoginBtn" class="btn-unlock-login hidden">Đăng Xuất Tài Khoản Hiện Tại</button>

                <p class="back-link" style="margin-top:0.35rem;">
                    Chưa có tài khoản? <a href="register">Đăng ký ngay</a>
                </p>
            </div>
        </div>
    </div>

    <div id="loadingOverlay" class="loading-overlay" aria-hidden="true">
        <div class="loading-modal" role="status" aria-live="polite">
            <div class="spinner" aria-hidden="true"></div>
            <p>Đang xác thực thông tin...</p>
        </div>
    </div>

    <footer class="site-footer">
        <div class="site-footer-inner">
            <p>© 2026 <a href="https://tsbyin.dev" target="_blank" rel="noopener noreferrer" style="font-weight:700;color:var(--cyan);text-shadow:0 0 8px var(--cyan);">tsbyin.dev</a> · <span data-vi>Thiết kế &amp; phát triển bởi</span><span data-en>Designed &amp; built by</span> <a href="https://tsbyin.dev" target="_blank" rel="noopener noreferrer" style="font-weight:700;color:var(--cyan);text-shadow:0 0 8px var(--cyan);">Tuấn Sỹ</a></p>
            <nav class="footer-nav" aria-label="Footer navigation">
                <a href="index">Trang chủ</a>
                <a href="https://tsbyin.dev/privacy.html">Privacy Policy</a>
                <a href="https://tsbyin.dev">tsbyin.dev</a>
            </nav>
        </div>
    </footer>

    
    <script src="assets/script.js"></script>
    <script src="assets/pages/login.js"></script>
</body>
</html>
